<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gene Presence/Absence Figure (a,b,c)</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #fff; color: #222; }
    .wrap { max-width: 1700px; margin: 14px auto; padding: 0 14px 24px 14px; }
    h2 { margin: 0 0 8px 0; font-size: 16px; }
    p.note { margin: 0 0 10px 0; font-size: 16px; color: #555; }
    .controls {
      display: grid;
      grid-template-columns: repeat(8, minmax(110px, 1fr));
      gap: 8px 10px;
      margin: 8px 0 10px 0;
      align-items: end;
      border: 1px solid #e6e6e6;
      border-radius: 6px;
      background: #fafafa;
      padding: 10px;
    }
    .controls label { font-size: 16px; color: #333; display: block; margin-bottom: 3px; }
    .controls input, .controls select, .controls button {
      width: 100%; box-sizing: border-box; padding: 6px; font-size: 16px;
    }
    #genePanel {
      margin-top: 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px;
      background: #fafafa;
    }
    #genePanelTop {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    #genePanelTop button {
      width: auto;
      padding: 5px 9px;
      font-size: 16px;
    }
    #geneSummary { font-size: 16px; color: #444; }
    #geneCheckboxes {
      max-height: 210px;
      overflow: auto;
      background: #fff;
      border: 1px solid #e2e2e2;
      border-radius: 4px;
      padding: 6px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 4px 8px;
    }
    .gene-item {
      display: flex; align-items: center; gap: 6px; font-size: 16px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #status { margin-top: 10px; font-size: 16px; color: #444; white-space: pre-wrap; }
    #tooltip {
      position: fixed; z-index: 9999; pointer-events: none;
      background: rgba(24, 24, 24, 0.95); color: #fff; border-radius: 6px;
      padding: 8px 10px; font-size: 16px; line-height: 1.35; max-width: 420px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35); display: none;
    }
    .figWrap {
      margin-top: 12px;
      border: 1px solid #ececec;
      border-radius: 6px;
      background: #fff;
      overflow: auto;
    }
    #figureSvg { display: block; }
    #taxonomyPanel {
      margin-top: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px;
      background: #fafafa;
    }
    #taxonomyPanelTop {
      display: flex;
      gap: 10px;
      align-items: end;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    #taxonomyPanelTop strong { font-size: 16px; }
    #taxonomyThresholdWrap label {
      display: block;
      margin-bottom: 3px;
      font-size: 16px;
      color: #333;
    }
    #taxonomyThresholdWrap input {
      width: 220px;
      box-sizing: border-box;
      padding: 6px;
      font-size: 16px;
    }
    #taxonomySummary, #taxonomySharedGenes, #taxonomyGeneLossTitle, #taxonomyNote {
      font-size: 16px;
      color: #444;
      white-space: pre-wrap;
    }
    #taxonomySummary { margin: 0 0 8px 0; }
    #taxonomySharedGenes { margin: 0 0 8px 0; }
    #taxonomyGeneLossTitle { margin: 10px 0 8px 0; }
    #taxonomyNote { margin: 0 0 10px 0; }
    #taxonomyTableWrap {
      max-height: 360px;
      overflow: auto;
      border: 1px solid #e2e2e2;
      border-radius: 4px;
      background: #fff;
    }
    #taxonomyTable {
      width: 100%;
      border-collapse: collapse;
      font-size: 15px;
    }
    #taxonomyTable th, #taxonomyTable td {
      border-bottom: 1px solid #ececec;
      padding: 6px 8px;
      text-align: left;
      vertical-align: top;
    }
    #taxonomyTable th {
      position: sticky;
      top: 0;
      background: #f5f5f5;
      z-index: 1;
    }
    #taxonomyTable th button {
      width: 100%;
      border: 0;
      background: transparent;
      padding: 0;
      font: inherit;
      color: inherit;
      text-align: left;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Gene Presence/Absence Figure</h2>
    <p class="note">
      Generates a 3-panel figure in one layout: <b>a</b> core-gene count distribution, <b>b</b> % core gene loss by gene, <b>c</b> % core gene loss by lineage.
    </p>

    <div class="controls">
      <div>
        <label for="defaultPath">Default TSV path</label>
        <input id="defaultPath" type="text" value="ortholog_lists/flagellar_genes_phyletic_distribution_withIDs_May10_2026.tsv" />
      </div>
      <div>
        <label for="fileInput">Or choose TSV file</label>
        <input id="fileInput" type="file" accept=".tsv,.txt,.csv" />
      </div>
      <div>
        <label for="suffix">Gene suffix</label>
        <input id="suffix" type="text" value="_count" />
      </div>
      <div>
        <label for="lineageLevel">Lineage level (panel c)</label>
        <select id="lineageLevel"></select>
      </div>
      <div>
        <label for="minTotalPresence">Min total core genes present per genome</label>
        <input id="minTotalPresence" type="number" min="0" step="1" value="25" />
      </div>
      <div>
        <label for="minLineageSize">Min lineage size (panel c)</label>
        <input id="minLineageSize" type="number" min="1" step="1" value="5" />
      </div>
      <div>
        <label for="fontSize">Axis title font size</label>
        <input id="fontSize" type="number" min="12" max="40" step="1" value="20" />
      </div>
      <div>
        <label for="rerunBtn">&nbsp;</label>
        <button id="rerunBtn" type="button">Recompute + draw</button>
      </div>
      <div>
        <label for="downloadSvgBtn">&nbsp;</label>
        <button id="downloadSvgBtn" type="button">Download SVG</button>
      </div>

      <div>
        <label for="barColor">Bar color</label>
        <input id="barColor" type="text" value="#7caec4" />
      </div>
      <div>
        <label for="useCoreFilter">Core-set genome filter</label>
        <input id="useCoreFilter" type="checkbox" checked />
      </div>
    </div>
    <p class="note" id="coreSetNote"></p>

    <div id="genePanel">
      <div id="genePanelTop">
        <strong style="font-size:16px;">Genes detected from file</strong>
        <button id="selectAllGenesBtn" type="button">Select all</button>
        <button id="clearAllGenesBtn" type="button">Clear all</button>
        <span id="geneSummary">No genes loaded.</span>
      </div>
      <div id="geneCheckboxes"></div>
    </div>

    <div class="figWrap">
      <svg id="figureSvg"></svg>
    </div>

    <div id="taxonomyPanel">
      <div id="taxonomyPanelTop">
        <strong>Genomes at or above a core-gene threshold</strong>
        <div id="taxonomyThresholdWrap">
          <label for="taxonomyMinGenes">Minimum selected core genes present</label>
          <input id="taxonomyMinGenes" type="number" min="0" step="1" value="49" />
        </div>
        <div>
          <label for="taxonomyExcludeFour">Exclude `DUF3383` from table filter</label>
          <input id="taxonomyExcludeFour" type="checkbox" checked />
        </div>
      </div>
      <p id="taxonomySummary">No data loaded.</p>
      <p id="taxonomySharedGenes"></p>
      <p id="taxonomyNote"></p>
      <div id="taxonomyTableWrap">
        <table id="taxonomyTable">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
      <p id="taxonomyGeneLossTitle"></p>
      <div class="figWrap">
        <svg id="taxonomyGeneLossSvg"></svg>
      </div>
    </div>

    <div id="status"></div>
    <div id="tooltip"></div>
  </div>

  <script>
    const TAXON_COLUMNS = ["domain", "phylum", "class", "order", "family", "genus", "species"];
    const CORE_FLAGELLAR_GENES = [
      "FliB", "FlgO", "FlgP", "SwrB", "Putative", "FapA",
      "SwrD", "Transglycosylase", "FlbB", "FliT", "PilZ", "FliW", "FlaG",
      "CsrA", "FlhG", "FlhF", "FlgA", "FlgH", "FlgM", "FlgI", "FlgN",
      "FliD", "FliA", "FliS", "FlgJ", "FlgF", "FlgL", "FlgG", "FliL",
      "FliK", "FliJ", "FliO", "FlgE", "FliH", "MotB", "FliF", "FlgD",
      "FliC", "FlgB", "FlgK", "FliI", "FliM", "FlgC", "FliE", "FliQ",
      "FlhB", "FliG", "FliR", "FliP", "MotA", "FliN", "FlhA"
    ];
    const PANEL_C_EXCLUDED_GENES = new Set(["FlgH", "FlgI", "FlgA", "FlgJ"]);
    const TABLE_FILTER_EXCLUDED_GENES = new Set(["DUF3383"]);
    let activeRows = null;
    let activeHeaders = null;
    let latestAnalysis = null;
    let taxonomyTableState = null;
    let taxonomySortState = { key: "presentCount", direction: "desc" };

    function setStatus(msg) { document.getElementById("status").textContent = msg; }
    function numberOrZero(v) { const x = Number(v); return Number.isFinite(x) ? x : 0; }
    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
    function makeSvgNode(tag, attrs = {}) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, String(v));
      return el;
    }
    const _measureCanvas = document.createElement("canvas");
    const _measureCtx = _measureCanvas.getContext("2d");
    function measureTextWidthPx(text, fontPx) {
      if (!_measureCtx) return String(text).length * fontPx * 0.62;
      _measureCtx.font = `${fontPx}px Arial, sans-serif`;
      return _measureCtx.measureText(String(text)).width;
    }
    function showTooltip(evt, html) {
      const tip = document.getElementById("tooltip");
      tip.innerHTML = html;
      tip.style.display = "block";
      const pad = 14;
      const x = evt.clientX + pad;
      const y = evt.clientY + pad;
      const maxX = window.innerWidth - tip.offsetWidth - 8;
      const maxY = window.innerHeight - tip.offsetHeight - 8;
      tip.style.left = `${Math.max(8, Math.min(x, maxX))}px`;
      tip.style.top = `${Math.max(8, Math.min(y, maxY))}px`;
    }
    function hideTooltip() { document.getElementById("tooltip").style.display = "none"; }

    function parseDelimited(text) {
      const lines = text.replace(/\r/g, "").split("\n").filter(line => line.trim().length > 0);
      if (lines.length < 2) throw new Error("Input file has no data rows.");
      const delimiter = lines[0].includes("\t") ? "\t" : ",";
      const headers = lines[0].split(delimiter).map(s => s.trim());
      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const parts = lines[i].split(delimiter);
        const row = {};
        for (let j = 0; j < headers.length; j++) row[headers[j]] = (parts[j] ?? "").trim();
        rows.push(row);
      }
      return { headers, rows };
    }

    function populateLineageDropdown(headers, suffix) {
      const select = document.getElementById("lineageLevel");
      const prev = select.value;
      select.innerHTML = "";
      const nonGeneCols = headers.filter(h => !h.endsWith(suffix));
      const candidates = TAXON_COLUMNS.filter(c => nonGeneCols.includes(c));
      if (candidates.length === 0) {
        const opt = document.createElement("option");
        opt.value = "";
        opt.textContent = "(no taxonomy column found)";
        select.appendChild(opt);
        select.disabled = true;
        return;
      }
      for (const col of candidates) {
        const opt = document.createElement("option");
        opt.value = col;
        opt.textContent = col;
        select.appendChild(opt);
      }
      select.disabled = false;
      if (prev && candidates.includes(prev)) select.value = prev;
      else if (candidates.includes("phylum")) select.value = "phylum";
      else if (candidates.includes("class")) select.value = "class";
      else select.value = candidates[0];
    }

    function updateGeneSummary() {
      const boxes = document.querySelectorAll(".gene-checkbox");
      const checked = document.querySelectorAll(".gene-checkbox:checked");
      document.getElementById("geneSummary").textContent =
        boxes.length ? `Selected ${checked.length} / ${boxes.length} genes` : "No genes loaded.";
    }

    function buildGeneCheckboxes(headers, suffix) {
      const host = document.getElementById("geneCheckboxes");
      host.innerHTML = "";
      const countCols = headers.filter(h => h.endsWith(suffix));
      for (const col of countCols) {
        const gene = col.slice(0, -suffix.length);
        const item = document.createElement("label");
        item.className = "gene-item";
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.className = "gene-checkbox";
        cb.value = gene;
        cb.checked = CORE_FLAGELLAR_GENES.includes(gene);
        cb.addEventListener("change", () => {
          updateGeneSummary();
          if (activeRows) recomputeAndDraw(activeRows);
        });
        const txt = document.createElement("span");
        txt.textContent = gene;
        txt.title = `${gene} (${col})`;
        item.appendChild(cb);
        item.appendChild(txt);
        host.appendChild(item);
      }
      updateGeneSummary();
    }

    function getSelectedGenes() {
      const out = [];
      document.querySelectorAll(".gene-checkbox:checked").forEach(cb => out.push(cb.value));
      return out;
    }

    function getOptions() {
      return {
        suffix: document.getElementById("suffix").value.trim(),
        lineageLevel: document.getElementById("lineageLevel").value,
        minTotalPresence: Math.max(0, Number(document.getElementById("minTotalPresence").value) || 0),
        minLineageSize: Math.max(1, Number(document.getElementById("minLineageSize").value) || 1),
        fontSize: Math.max(12, Number(document.getElementById("fontSize").value) || 20),
        barColor: document.getElementById("barColor").value.trim(),
        useCoreFilter: document.getElementById("useCoreFilter").checked
      };
    }

    function filterRowsByCoreSet(rows, suffix, coreGenes, minPresence) {
      if (!rows || rows.length === 0) return { rows: [], usedCoreCols: [], missingCoreGenes: [] };
      const headers = Object.keys(rows[0]);
      const usedCoreCols = coreGenes.map(g => `${g}${suffix}`).filter(c => headers.includes(c));
      const missingCoreGenes = coreGenes.filter(g => !headers.includes(`${g}${suffix}`));
      const threshold = Math.max(1, Math.min(usedCoreCols.length, Number(minPresence) || 1));
      const keptRows = rows.filter(r => {
        let present = 0;
        for (const c of usedCoreCols) if (numberOrZero(r[c]) > 0) present += 1;
        return present >= threshold;
      });
      return { rows: keptRows, usedCoreCols, missingCoreGenes };
    }

    function filterRowsByMinPresence(rows, geneCols, minTotalPresence) {
      return rows.filter(r => {
        let present = 0;
        for (const c of geneCols) if (numberOrZero(r[c]) > 0) present += 1;
        return present >= minTotalPresence;
      });
    }

    function buildPanelA(rows, geneCols, totalPossibleCount, minStart) {
      const counts = rows.map(r => {
        let present = 0;
        for (const c of geneCols) if (numberOrZero(r[c]) > 0) present += 1;
        return present;
      });
      const maxPotential = Math.max(0, Number(totalPossibleCount) || 0);
      const start = Math.max(0, Math.min(maxPotential, Number(minStart) || 0));
      if (counts.length === 0) {
        const bins = [];
        for (let x = start; x <= maxPotential; x++) bins.push({ x, y: 0 });
        return { bins, maxY: 0 };
      }
      const min = start;
      const max = maxPotential;
      const freq = new Map();
      for (let x = min; x <= max; x++) freq.set(x, 0);
      for (const c of counts) {
        if (c < min || c > max) continue;
        freq.set(c, (freq.get(c) || 0) + 1);
      }
      const bins = Array.from(freq.entries()).map(([x, y]) => ({ x, y }));
      const maxY = Math.max(...bins.map(b => b.y), 0);
      return { bins, maxY };
    }

    function buildPanelB(rows, genes, suffix, countMode = "total") {
      const recs = [];
      const n = rows.length;
      for (const g of genes) {
        const col = `${g}${suffix}`;
        if (n === 0) continue;
        let present = 0;
        for (const r of rows) if (numberOrZero(r[col]) > 0) present += 1;
        const missing = n - present;
        const pctAbsent = 100 * (1 - present / n);
        recs.push({ label: g, value: pctAbsent, n: countMode === "missing" ? missing : n });
      }
      recs.sort((a, b) => b.value - a.value);
      return recs;
    }

    function buildPanelC(rows, genes, suffix, lineageLevel, minLineageSize) {
      const byLineage = new Map();
      for (const r of rows) {
        let lin = String(r[lineageLevel] ?? "").trim();
        if (lineageLevel === "phylum") {
          const ph = lin.replace(/^p__/, "");
          const isPseudo = /^p?__?pseudomonadota$/i.test(lin) || /^pseudomonadota$/i.test(ph) || /^pseudomonadata$/i.test(ph);
          if (isPseudo) {
            const cl = String(r["class"] ?? "").trim().replace(/^c__/, "");
            if (cl) lin = `${cl}*`;
            else lin = `${ph}*`;
          } else {
            lin = ph;
          }
        }
        if (!lin) continue;
        if (!byLineage.has(lin)) byLineage.set(lin, []);
        byLineage.get(lin).push(r);
      }
      const recs = [];
      for (const [lin, grp] of byLineage.entries()) {
        if (grp.length < minLineageSize) continue;
        let absent = 0;
        const total = grp.length * genes.length;
        for (const r of grp) {
          for (const g of genes) {
            const col = `${g}${suffix}`;
            if (numberOrZero(r[col]) <= 0) absent += 1;
          }
        }
        const pctAbsent = total > 0 ? (100 * absent / total) : 0;
        recs.push({ label: lin, value: pctAbsent, n: grp.length });
      }
      recs.sort((a, b) => b.value - a.value);
      return recs;
    }

    function selectTopAndBottom(records, countPerSide = 5) {
      if (!Array.isArray(records) || records.length === 0) return [];
      const n = Math.max(0, Number(countPerSide) || 0);
      if (n === 0) return [];
      if (records.length <= n * 2) return [...records];
      const top = records.slice(0, n);
      const bottom = records.slice(-n);
      const omittedCount = Math.max(0, records.length - (top.length + bottom.length));
      const separator = { label: "...", value: 0, n: omittedCount, isSeparator: true };
      return [...top, separator, ...bottom];
    }

    function inferGenomeIdColumn(rows) {
      if (!rows || rows.length === 0) return "";
      const headers = Object.keys(rows[0]);
      const preferred = ["assembly", "genome", "genome_id", "accession", "assembly_accession", "name"];
      for (const col of preferred) if (headers.includes(col)) return col;
      return headers.find(h => !h.endsWith("_count") && !h.endsWith("_ids") && !TAXON_COLUMNS.includes(h)) || "";
    }

    function compareTaxonomyValues(a, b, type) {
      if (type === "number") {
        const aNum = Number(a);
        const bNum = Number(b);
        const aOk = Number.isFinite(aNum);
        const bOk = Number.isFinite(bNum);
        if (!aOk && !bOk) return 0;
        if (!aOk) return 1;
        if (!bOk) return -1;
        return aNum - bNum;
      }
      return String(a ?? "").localeCompare(String(b ?? ""), undefined, { numeric: true, sensitivity: "base" });
    }

    function renderTaxonomyTable() {
      const thead = document.querySelector("#taxonomyTable thead");
      const tbody = document.querySelector("#taxonomyTable tbody");
      thead.innerHTML = "";
      tbody.innerHTML = "";
      if (!taxonomyTableState) return;

      const { columnDefs, rows } = taxonomyTableState;
      const activeSort = columnDefs.some(col => col.key === taxonomySortState.key)
        ? taxonomySortState
        : { key: "presentCount", direction: "desc" };
      taxonomySortState = activeSort;

      const headRow = document.createElement("tr");
      for (const col of columnDefs) {
        const th = document.createElement("th");
        const btn = document.createElement("button");
        const isActive = activeSort.key === col.key;
        const arrow = isActive ? (activeSort.direction === "asc" ? " ▲" : " ▼") : "";
        btn.type = "button";
        btn.textContent = `${col.label}${arrow}`;
        btn.addEventListener("click", () => {
          if (taxonomySortState.key === col.key) {
            taxonomySortState = {
              key: col.key,
              direction: taxonomySortState.direction === "asc" ? "desc" : "asc"
            };
          } else {
            taxonomySortState = { key: col.key, direction: "asc" };
          }
          renderTaxonomyTable();
        });
        th.appendChild(btn);
        headRow.appendChild(th);
      }
      thead.appendChild(headRow);

      const sortColumn = columnDefs.find(col => col.key === activeSort.key) || columnDefs[0];
      const directionFactor = activeSort.direction === "asc" ? 1 : -1;
      const sortedRows = [...rows].sort((a, b) => {
        const cmp = compareTaxonomyValues(a.cells[sortColumn.key], b.cells[sortColumn.key], sortColumn.type);
        if (cmp !== 0) return cmp * directionFactor;
        return a.originalIndex - b.originalIndex;
      });

      for (const row of sortedRows) {
        const tr = document.createElement("tr");
        for (const col of columnDefs) {
          const td = document.createElement("td");
          td.textContent = String(row.cells[col.key] ?? "");
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }
    }

    function updateTaxonomySection(rows, usedGenes, suffix, suggestedThreshold) {
      latestAnalysis = { rows, usedGenes, suffix };
      const input = document.getElementById("taxonomyMinGenes");
      const excludeFourForTable = document.getElementById("taxonomyExcludeFour").checked;
      const summary = document.getElementById("taxonomySummary");
      const sharedGenes = document.getElementById("taxonomySharedGenes");
      const geneLossTitle = document.getElementById("taxonomyGeneLossTitle");
      const note = document.getElementById("taxonomyNote");
      const opts = getOptions();

      if (!rows || rows.length === 0 || !usedGenes || usedGenes.length === 0) {
        taxonomyTableState = null;
        renderTaxonomyTable();
        summary.textContent = "No genomes available for taxonomy lookup.";
        sharedGenes.textContent = "";
        geneLossTitle.textContent = "";
        drawTaxonomyGeneLossPlot([], opts);
        note.textContent = "";
        return;
      }

      const tableFilterGenes = excludeFourForTable
        ? usedGenes.filter(g => !TABLE_FILTER_EXCLUDED_GENES.has(g))
        : [...usedGenes];
      const geneCols = tableFilterGenes.map(g => `${g}${suffix}`).filter(c => c in rows[0]);
      const maxCount = geneCols.length;
      input.max = String(maxCount);
      const currentValue = Number(input.value);
      const fallback = Math.max(0, Math.min(maxCount, Number(suggestedThreshold) || 0));
      const minGenes = Number.isFinite(currentValue) ? Math.max(0, Math.min(maxCount, Math.floor(currentValue))) : fallback;
      input.value = String(minGenes);

      const genomeIdCol = inferGenomeIdColumn(rows);
      const taxonomyCols = ["domain", "phylum", "class"].filter(col => col in rows[0]);
      const lineageLevel = document.getElementById("lineageLevel").value;
      const extraLineageCol = lineageLevel && !taxonomyCols.includes(lineageLevel) && lineageLevel in rows[0] ? [lineageLevel] : [];
      const genomeMissingGenesCol = "genome missing selected core genes";
      const genomeIdKey = genomeIdCol || "genome";
      const columnDefs = [
        { key: genomeIdKey, label: genomeIdKey, type: "string" },
        { key: "presentCount", label: "table filter genes present", type: "number" },
        ...taxonomyCols.map(col => ({ key: col, label: col, type: "string" })),
        ...extraLineageCol.map(col => ({ key: col, label: col, type: "string" })),
        { key: "genomeMissingGenes", label: genomeMissingGenesCol, type: "string" }
      ];

      const records = rows.map(row => {
        let present = 0;
        for (const col of geneCols) if (numberOrZero(row[col]) > 0) present += 1;
        return { row, present };
      })
        .filter(rec => rec.present >= minGenes)
        .sort((a, b) => b.present - a.present || String(a.row[genomeIdCol] ?? "").localeCompare(String(b.row[genomeIdCol] ?? "")));

      const lineageValues = lineageLevel
        ? [...new Set(records
          .map(rec => String(rec.row[lineageLevel] ?? "").trim())
          .filter(Boolean))]
        : [];
      const lineageMissingGenes = new Map();
      for (const lineage of lineageValues) {
        const missingGenes = usedGenes.filter(g => {
          const col = `${g}${suffix}`;
          return !records.some(rec => String(rec.row[lineageLevel] ?? "").trim() === lineage && numberOrZero(rec.row[col]) > 0);
        });
        lineageMissingGenes.set(lineage, missingGenes);
      }

      const tableRows = records.map((rec, idx) => {
        const genomeMissingGenes = usedGenes.filter(g => numberOrZero(rec.row[`${g}${suffix}`]) <= 0);
        const cells = {
          [genomeIdKey]: genomeIdCol ? String(rec.row[genomeIdCol] ?? "") : "",
          presentCount: rec.present,
          genomeMissingGenes: genomeMissingGenes.length ? genomeMissingGenes.join(", ") : "none"
        };
        for (const col of taxonomyCols) cells[col] = String(rec.row[col] ?? "");
        for (const col of extraLineageCol) cells[col] = String(rec.row[col] ?? "");
        return { cells, originalIndex: idx };
      });
      taxonomyTableState = { columnDefs, rows: tableRows };
      renderTaxonomyTable();

      const genesSharedAcrossLineages = usedGenes.filter(g => {
        const col = `${g}${suffix}`;
        return lineageValues.every(lineage =>
          records.some(rec => String(rec.row[lineageLevel] ?? "").trim() === lineage && numberOrZero(rec.row[col]) > 0)
        );
      });
      const genesAbsentFromAtLeastOneLineage = usedGenes.filter(g => !genesSharedAcrossLineages.includes(g));

      summary.textContent =
        `Genomes shown: ${records.length} / ${rows.length}\n` +
        `Threshold: at least ${minGenes} of ${maxCount} table-filter genes present` +
        (excludeFourForTable ? `\nExcluded from table filter: ${Array.from(TABLE_FILTER_EXCLUDED_GENES).join(", ")}` : "");
      if (!lineageLevel) {
        sharedGenes.textContent = "Shared-lineage gene summary unavailable because no lineage level is selected.";
      } else if (lineageValues.length === 0) {
        sharedGenes.textContent = `No ${lineageLevel} values are available among the genomes shown for the table.`;
      } else {
        sharedGenes.textContent =
          `${lineageValues.length} ${lineageLevel} lineages are represented in the table.\n` +
          `Selected core genes found in every represented lineage: ` +
          (genesSharedAcrossLineages.length ? genesSharedAcrossLineages.join(", ") : "none") + `\n` +
          `Selected core genes absent from at least one represented lineage: ` +
          (genesAbsentFromAtLeastOneLineage.length ? genesAbsentFromAtLeastOneLineage.join(", ") : "none");
      }
      const geneLossSummary = buildPanelB(records.map(rec => rec.row), usedGenes, suffix, "missing");
      geneLossTitle.textContent = "Percent gene loss in the genomes shown in the table";
      drawTaxonomyGeneLossPlot(geneLossSummary, opts);
      note.textContent =
        "This summary and table use the genomes currently included in the figure after filtering. The table threshold uses the table-filter genes, while the missing-gene column and gene-loss plot still reflect the selected genes.";
    }

    function getPlotLabelPad(records, axisTitleFontSize, minPad = 84) {
      const tickFontSize = 16;
      const xTickOffset = 8;
      const xTitleGap = Math.max(54, axisTitleFontSize + 34);
      const maxLabelWidthPx = Math.max(1, ...records.map(r => measureTextWidthPx(r.label, tickFontSize)));
      return Math.max(minPad, Math.min(360, Math.ceil(maxLabelWidthPx + xTickOffset + xTitleGap)));
    }

    function drawVerticalBarPlot(svg, area, records, opts) {
      const { x, y, w, h, xTitle, yTitle, panelTag } = area;
      const barColor = opts.barColor || "#7caec4";
      const tickFontSize = 16;
      const axisTitleFontSize = Math.max(12, Number(opts.fontSize) || 20) * 1.5;
      const panelLabelFontSize = 24;
      const titleY = y - 20;
      const yAxisTitleX = x + 40;
      const leftGutter = Math.max(88, Math.ceil(axisTitleFontSize * 3.8));
      svg.appendChild(makeSvgNode("text", {
        x: x + 2, y: titleY, "font-size": panelLabelFontSize, fill: "#333",
        "dominant-baseline": "middle"
      })).textContent = `${panelTag}.`;

      const left = x + leftGutter;
      const right = x + w - 14;
      const top = y + 12;
      const xTickOffset = 8;
      const xTickShift = 6; // slight right shift to center labels on bars
      const labelPad = area.labelPad ?? getPlotLabelPad(records, axisTitleFontSize);
      const bottom = area.plotHeight ? top + area.plotHeight : y + h - labelPad;
      const plotW = Math.max(10, right - left);
      const plotH = Math.max(10, bottom - top);

      svg.appendChild(makeSvgNode("line", { x1: left, y1: bottom, x2: right, y2: bottom, stroke: "#444", "stroke-width": 1 }));
      svg.appendChild(makeSvgNode("line", { x1: left, y1: bottom, x2: left, y2: top, stroke: "#444", "stroke-width": 1 }));

      const rawMaxY = Math.max(...records.map(r => r.value), 1);
      function getNiceStep(maxVal, targetTicks = 5) {
        const rough = Math.max(1e-9, maxVal / targetTicks);
        const pow10 = Math.pow(10, Math.floor(Math.log10(rough)));
        const base = rough / pow10;
        const niceBase = base <= 1 ? 1 : (base <= 2 ? 2 : (base <= 5 ? 5 : 10));
        return niceBase * pow10;
      }
      const yStep = getNiceStep(rawMaxY, 5);
      const niceMaxY = Math.ceil(rawMaxY / yStep) * yStep;
      const yTickVals = [];
      for (let v = 0; v <= niceMaxY + yStep * 0.5; v += yStep) yTickVals.push(v);

      for (const val of yTickVals) {
        const yy = bottom - (val / niceMaxY) * plotH;
        svg.appendChild(makeSvgNode("line", { x1: left - 4, y1: yy, x2: left, y2: yy, stroke: "#444", "stroke-width": 1 }));
        svg.appendChild(makeSvgNode("text", {
          x: left - 6, y: yy, "text-anchor": "end", "dominant-baseline": "middle",
          "font-size": tickFontSize, fill: "#444"
        })).textContent = Number.isInteger(val) ? String(val) : val.toFixed(2).replace(/\.?0+$/, "");
      }

      if (records.length > 0) {
        const barGap = 2;
        const barW = Math.max(1, (plotW / records.length) - barGap);
        for (let i = 0; i < records.length; i++) {
          const r = records[i];
          const isSeparator = Boolean(r.isSeparator);
          const bh = (r.value / niceMaxY) * plotH;
          const bx = left + i * (plotW / records.length) + (barGap / 2);
          const by = bottom - bh;
          if (!isSeparator) {
            const rect = makeSvgNode("rect", { x: bx, y: by, width: barW, height: bh, fill: barColor });
            rect.addEventListener("mousemove", (evt) => {
              const nTxt = r.n != null ? `<br><b>n:</b> ${Number(r.n).toLocaleString()}` : "";
              showTooltip(evt, `<b>${escapeHtml(r.label)}:</b> ${r.value.toFixed(2)}${nTxt}`);
            });
            rect.addEventListener("mouseleave", hideTooltip);
            svg.appendChild(rect);
          }

          const lx = bx + barW / 2 + xTickShift;
          const ly = bottom + xTickOffset;
          const txt = isSeparator
            ? makeSvgNode("text", {
              x: bx + barW / 2, y: (top + bottom) / 2, "font-size": tickFontSize + 4, fill: "#666",
              "text-anchor": "middle", "dominant-baseline": "middle"
            })
            : makeSvgNode("text", {
              x: lx, y: ly, "font-size": tickFontSize, fill: "#222",
              transform: `rotate(-90 ${lx} ${ly})`, "text-anchor": "end"
            });
          txt.textContent = String(r.label);
          svg.appendChild(txt);
        }
      }

      const xTitleY = bottom + Math.max(50, axisTitleFontSize + 22);
      svg.appendChild(makeSvgNode("text", {
        x: (left + right) / 2, y: xTitleY, "text-anchor": "middle",
        "font-size": axisTitleFontSize, fill: "#333"
      })).textContent = xTitle;
      svg.appendChild(makeSvgNode("text", {
        x: yAxisTitleX,
        y: (top + bottom) / 2,
        transform: `rotate(-90 ${yAxisTitleX} ${(top + bottom) / 2})`,
        "text-anchor": "middle", "dominant-baseline": "middle",
        "font-size": axisTitleFontSize, fill: "#333"
      })).textContent = yTitle;
    }

    function drawFigure(panelA, panelB, panelC, opts, lineageLevel) {
      const svg = document.getElementById("figureSvg");
      while (svg.firstChild) svg.removeChild(svg.firstChild);
      const W = 1600;
      const panelARecords = panelA.bins.map(b => ({ label: String(b.x), value: b.y }));
      const axisTitleFontSize = Math.max(12, Number(opts.fontSize) || 20) * 1.5;
      const sharedPlotHeight = 260;
      const panelLabelPad = Math.max(
        getPlotLabelPad(panelARecords, axisTitleFontSize, 150),
        getPlotLabelPad(panelB, axisTitleFontSize, 150),
        getPlotLabelPad(panelC, axisTitleFontSize)
      );
      const panelH = sharedPlotHeight + panelLabelPad + 12;
      const panelW = Math.floor((W - 32) * 0.75);
      const panelX = Math.floor((W - panelW) / 2);
      const rowGap = 16;
      const panelAY = 36;
      const panelBY = panelAY + panelH + rowGap;
      const panelCY = panelBY + panelH + rowGap;
      const H = panelCY + panelH + 24;
      svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
      svg.setAttribute("width", W);
      svg.setAttribute("height", H);
      svg.setAttribute("font-family", "Arial, sans-serif");
      svg.appendChild(makeSvgNode("rect", { x: 0, y: 0, width: W, height: H, fill: "#fff" }));

      drawVerticalBarPlot(svg, {
        x: panelX, y: panelAY, w: panelW, h: panelH,
        xTitle: "Number of Core Genes",
        yTitle: "Number of Genomes",
        panelTag: "a",
        labelPad: panelLabelPad,
        plotHeight: sharedPlotHeight,
        xTitleOffsetFromBottom: 90
      }, panelARecords, opts);

      drawVerticalBarPlot(svg, {
        x: panelX, y: panelBY, w: panelW, h: panelH,
        xTitle: "Core Genes",
        yTitle: "% Core Gene Loss",
        panelTag: "b",
        labelPad: panelLabelPad,
        plotHeight: sharedPlotHeight,
        xTitleOffsetFromBottom: 90
      }, panelB, opts);

      drawVerticalBarPlot(svg, {
        x: panelX, y: panelCY, w: panelW, h: panelH,
        xTitle: "Lineage",
        yTitle: "% Core Gene Loss",
        panelTag: "c",
        labelPad: panelLabelPad,
        plotHeight: sharedPlotHeight,
        xTitleOffsetFromBottom: 90
      }, panelC, opts);
    }

    function drawTaxonomyGeneLossPlot(records, opts) {
      const svg = document.getElementById("taxonomyGeneLossSvg");
      while (svg.firstChild) svg.removeChild(svg.firstChild);
      if (!records || records.length === 0) {
        svg.setAttribute("viewBox", "0 0 1600 40");
        svg.setAttribute("width", 1600);
        svg.setAttribute("height", 40);
        return;
      }

      const axisTitleFontSize = Math.max(12, Number(opts.fontSize) || 20) * 1.5;
      const plotHeight = 260;
      const labelPad = getPlotLabelPad(records, axisTitleFontSize, 150);
      const W = 1600;
      const H = plotHeight + labelPad + 48;
      svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
      svg.setAttribute("width", W);
      svg.setAttribute("height", H);
      svg.setAttribute("font-family", "Arial, sans-serif");
      svg.appendChild(makeSvgNode("rect", { x: 0, y: 0, width: W, height: H, fill: "#fff" }));

      drawVerticalBarPlot(svg, {
        x: 16, y: 36, w: 1568, h: H - 36,
        xTitle: "Core Genes",
        yTitle: "% Core Gene Loss",
        panelTag: "t",
        labelPad,
        plotHeight,
        xTitleOffsetFromBottom: 4
      }, records, opts);
    }

    function downloadCurrentSvg() {
      const svg = document.getElementById("figureSvg");
      if (!svg || !svg.childNodes.length) throw new Error("No figure is available to download yet.");

      const clone = svg.cloneNode(true);
      clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
      clone.setAttribute("xmlns:xlink", "http://www.w3.org/1999/xlink");
      clone.setAttribute("font-family", "Arial, sans-serif");

      const source = `<?xml version="1.0" encoding="UTF-8"?>\n${new XMLSerializer().serializeToString(clone)}`;
      const blob = new Blob([source], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "gene_presence_absence_figure.svg";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    async function loadTextFromDefaultPath() {
      const path = document.getElementById("defaultPath").value.trim();
      if (!path) throw new Error("Default TSV path is empty.");
      const res = await fetch(path);
      if (!res.ok) throw new Error(`Could not fetch file: ${path} (HTTP ${res.status})`);
      return await res.text();
    }
    async function loadTextFromFileInput() {
      const file = document.getElementById("fileInput").files[0];
      if (!file) return null;
      return await file.text();
    }

    function recomputeAndDraw(rows) {
      const opts = getOptions();
      const selectedGenes = getSelectedGenes();
      if (selectedGenes.length === 0) throw new Error("Select at least one gene.");
      if (!opts.lineageLevel) throw new Error("Select lineage level.");

      const geneCols = selectedGenes.map(g => `${g}${opts.suffix}`).filter(c => rows.length > 0 && c in rows[0]);
      const usedGenes = geneCols.map(c => c.slice(0, -opts.suffix.length));
      if (usedGenes.length === 0) throw new Error("No selected genes match current suffix.");
      const coreCols = CORE_FLAGELLAR_GENES
        .map(g => `${g}${opts.suffix}`)
        .filter(c => rows.length > 0 && c in rows[0]);

      let analysisRows = rows;
      let coreInfo = { usedCoreCols: [], missingCoreGenes: [] };
      if (opts.useCoreFilter) {
        const filtered = filterRowsByCoreSet(rows, opts.suffix, CORE_FLAGELLAR_GENES, opts.minTotalPresence);
        analysisRows = filtered.rows;
        coreInfo = filtered;
      } else {
        coreInfo = {
          usedCoreCols: coreCols,
          missingCoreGenes: CORE_FLAGELLAR_GENES.filter(g => !(rows.length > 0 && (`${g}${opts.suffix}` in rows[0])))
        };
        // Even when core filter toggle is off, minTotalPresence is still counted on core genes.
        if (coreCols.length > 0) {
          analysisRows = filterRowsByMinPresence(analysisRows, coreCols, opts.minTotalPresence);
        } else {
          analysisRows = filterRowsByMinPresence(analysisRows, geneCols, opts.minTotalPresence);
        }
      }
      if (analysisRows.length === 0) throw new Error("No genomes remain after filtering.");

      // Panel a should reflect currently selected genes (so max drops when genes are removed).
      const panelACountCols = geneCols;
      const panelA = buildPanelA(
        analysisRows,
        panelACountCols,
        panelACountCols.length,
        opts.minTotalPresence
      );
      const panelB = buildPanelB(analysisRows, usedGenes, opts.suffix);
      const panelCGenes = usedGenes.filter(g => !PANEL_C_EXCLUDED_GENES.has(g));
      if (panelCGenes.length === 0) throw new Error("No selected genes remain for panel c after exclusions.");
      const panelC = buildPanelC(analysisRows, panelCGenes, opts.suffix, opts.lineageLevel, opts.minLineageSize);
      const panelCShown = selectTopAndBottom(panelC, 20);
      updateTaxonomySection(analysisRows, usedGenes, opts.suffix, opts.minTotalPresence);

      drawFigure(panelA, panelB, panelCShown, opts, opts.lineageLevel);

      setStatus(
        `Rows loaded: ${rows.length}\n` +
        `Rows used for analysis: ${analysisRows.length}\n` +
        `Selected genes: ${usedGenes.length}\n` +
        `Panel c genes used: ${panelCGenes.length} (excluded: FlgH, FlgI, FlgA, FlgJ)\n` +
        `Lineage level: ${opts.lineageLevel}\n` +
        `Min total core genes present per genome: ${opts.minTotalPresence}\n` +
        `Min lineage size: ${opts.minLineageSize}\n` +
        `Core-set filter: ${opts.useCoreFilter}\n` +
        `Core genes used: ${coreInfo.usedCoreCols.length}${coreInfo.missingCoreGenes.length ? " (missing: " + coreInfo.missingCoreGenes.join(", ") + ")" : ""}\n` +
        `Panel c lineages shown: ${panelCShown.length} of ${panelC.length} (top 20 + bottom 20)`
      );
    }

    async function loadDataAndDraw() {
      try {
        setStatus("Loading data...");
        const text = (await loadTextFromFileInput()) || (await loadTextFromDefaultPath());
        const parsed = parseDelimited(text);
        activeHeaders = parsed.headers;
        activeRows = parsed.rows;
        const suffix = document.getElementById("suffix").value.trim();
        populateLineageDropdown(activeHeaders, suffix);
        buildGeneCheckboxes(activeHeaders, suffix);
        document.getElementById("coreSetNote").textContent =
          `Core-set filter genes: ${CORE_FLAGELLAR_GENES.join(", ")}`;
        recomputeAndDraw(activeRows);
      } catch (err) {
        setStatus(`Error: ${err.message}\nTip: If default path fails in file:// mode, use the file picker or run a local static server.`);
      }
    }

    document.getElementById("rerunBtn").addEventListener("click", () => {
      try {
        if (!activeRows) { loadDataAndDraw(); return; }
        recomputeAndDraw(activeRows);
      } catch (err) {
        setStatus(`Error: ${err.message}`);
      }
    });
    document.getElementById("downloadSvgBtn").addEventListener("click", () => {
      try {
        downloadCurrentSvg();
      } catch (err) {
        setStatus(`Error: ${err.message}`);
      }
    });
    document.getElementById("fileInput").addEventListener("change", () => loadDataAndDraw());
    document.getElementById("selectAllGenesBtn").addEventListener("click", () => {
      document.querySelectorAll(".gene-checkbox").forEach(cb => cb.checked = true);
      updateGeneSummary();
      if (activeRows) recomputeAndDraw(activeRows);
    });
    document.getElementById("clearAllGenesBtn").addEventListener("click", () => {
      document.querySelectorAll(".gene-checkbox").forEach(cb => cb.checked = false);
      updateGeneSummary();
      setStatus("No genes selected.");
    });
    document.getElementById("suffix").addEventListener("change", () => {
      if (!activeHeaders) return;
      const suffix = document.getElementById("suffix").value.trim();
      populateLineageDropdown(activeHeaders, suffix);
      buildGeneCheckboxes(activeHeaders, suffix);
      if (activeRows) recomputeAndDraw(activeRows);
    });
    document.getElementById("taxonomyMinGenes").addEventListener("change", () => {
      if (!latestAnalysis) return;
      updateTaxonomySection(
        latestAnalysis.rows,
        latestAnalysis.usedGenes,
        latestAnalysis.suffix,
        document.getElementById("taxonomyMinGenes").value
      );
    });
    document.getElementById("taxonomyExcludeFour").addEventListener("change", () => {
      if (!latestAnalysis) return;
      updateTaxonomySection(
        latestAnalysis.rows,
        latestAnalysis.usedGenes,
        latestAnalysis.suffix,
        document.getElementById("taxonomyMinGenes").value
      );
    });
    ["lineageLevel", "minTotalPresence", "minLineageSize", "fontSize", "barColor", "useCoreFilter"]
      .forEach(id => document.getElementById(id).addEventListener("change", () => {
        if (activeRows) {
          try { recomputeAndDraw(activeRows); } catch (err) { setStatus(`Error: ${err.message}`); }
        }
      }));

    loadDataAndDraw();
  </script>
</body>
</html>
